name: CI FastAPI

on:
  push:
    branches: []
  pull_request:
    branches: [develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint avec Ruff
        run: |
          pip install ruff
          ruff check .

      - name: Mec, t'es bo & t'es trop fort !
        run: |
          echo "Mec, t'es bo ^^"
          echo "Mec, t'es trop fort ! ^^"
