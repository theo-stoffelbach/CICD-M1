name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]

jobs:
  publish:
    name: Build et push des images sur GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' && 'main' || 'develop') || github.event.workflow_run.head_branch }}

    steps:
      - name: Checkout du commit à déployer
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Se connecter à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Déterminer les tags (prod=latest, develop=staging)
        id: tags
        run: |
          if [ "$TARGET_BRANCH" = "main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "backend_tags=ghcr.io/${{ github.repository_owner }}/wordle-backend:latest,ghcr.io/${{ github.repository_owner }}/wordle-backend:$DEPLOY_SHA" >> $GITHUB_OUTPUT
            echo "frontend_tags=ghcr.io/${{ github.repository_owner }}/wordle-frontend:latest,ghcr.io/${{ github.repository_owner }}/wordle-frontend:$DEPLOY_SHA" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "backend_tags=ghcr.io/${{ github.repository_owner }}/wordle-backend:staging,ghcr.io/${{ github.repository_owner }}/wordle-backend:staging-$DEPLOY_SHA" >> $GITHUB_OUTPUT
            echo "frontend_tags=ghcr.io/${{ github.repository_owner }}/wordle-frontend:staging,ghcr.io/${{ github.repository_owner }}/wordle-frontend:staging-$DEPLOY_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Build et push backend (${{ steps.tags.outputs.env }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}

      - name: Build et push frontend (${{ steps.tags.outputs.env }})
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          build-args: |
            VITE_API_URL=${{ steps.tags.outputs.env == 'prod' && (vars.VITE_API_URL || 'https://wordle-api.theo-stoffelbach.fr') || (vars.VITE_API_URL_STAGING || 'https://wordle-api-staging.theo-stoffelbach.fr') }}
