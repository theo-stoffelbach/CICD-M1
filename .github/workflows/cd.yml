name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  publish:
    name: Build et push des images sur GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout du commit à déployer
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Se connecter à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wordle-backend:latest
            ghcr.io/${{ github.repository_owner }}/wordle-backend:${{ env.DEPLOY_SHA }}

      - name: Build et push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wordle-frontend:latest
            ghcr.io/${{ github.repository_owner }}/wordle-frontend:${{ env.DEPLOY_SHA }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://wordle-api.theo-stoffelbach.fr' }}
