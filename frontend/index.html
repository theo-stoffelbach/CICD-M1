<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Wordle</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-variant": "#353436",
            "surface-container-highest": "#353436",
            "surface": "#131314",
            "on-surface": "#e5e2e3",
            "surface-container": "#201f20",
            "surface-container-low": "#1c1b1c",
            "surface-container-high": "#2a2a2b",
            "surface-container-lowest": "#0e0e0f",
            "surface-bright": "#39393a",
            "outline": "#8b9386",
            "outline-variant": "#41493e",
            "primary": "#94d78c",
            "primary-container": "#6aaa64",
            "primary-fixed": "#aff4a6",
            "on-primary": "#003908",
            "on-primary-container": "#003c09",
            "secondary": "#dcc668",
            "secondary-container": "#6b5b01",
            "on-secondary-container": "#ebd475",
            "error": "#ffb4ab",
            "error-container": "#93000a",
            "on-error-container": "#ffdad6",
            "on-surface-variant": "#c0c9bb",
          },
          fontFamily: {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem",
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .key-press:active { transform: scale(0.92); }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    @keyframes flip {
      0%   { transform: rotateX(0deg); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0deg); }
    }
    .animate-pop  { animation: pop  0.15s ease; }
    .animate-shake { animation: shake 0.4s ease; }
    .tile-flip    { animation: flip 0.5s ease forwards; }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center select-none">

  <!-- Header -->
  <header class="bg-surface sticky top-0 z-40 w-full border-b border-surface-container">
    <div class="flex justify-between items-center px-4 h-14 w-full max-w-lg mx-auto">
      <span class="text-xl font-black tracking-tighter text-on-surface font-headline">WORDLE</span>
      <div class="flex items-center gap-2">
        <button onclick="giveUp()" title="Abandonner / Rejouer"
          class="p-2 rounded-xl text-on-surface hover:bg-surface-container-high transition-all">
          <span class="material-symbols-outlined text-xl">refresh</span>
        </button>
        <a href="profile.html" title="Mon profil"
          class="p-2 rounded-xl text-on-surface hover:bg-surface-container-high transition-all">
          <span class="material-symbols-outlined text-xl">account_circle</span>
        </a>
        <div class="flex items-center gap-1">
          <button id="btn-fr" onclick="switchLanguage('fr')"
            class="px-3 py-1 rounded-xl text-sm font-bold font-headline transition-all duration-200">FR</button>
          <button id="btn-en" onclick="switchLanguage('en')"
            class="px-3 py-1 rounded-xl text-sm font-bold font-headline transition-all duration-200">EN</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Language select overlay (shown at startup & after giving up) -->
  <div id="lang-overlay" class="hidden fixed inset-0 z-[60] bg-surface flex flex-col items-center justify-center gap-8 p-4">
    <h1 class="text-4xl font-black tracking-tighter text-on-surface font-headline">WORDLE</h1>
    <p id="lang-subtitle" class="text-on-surface-variant text-center max-w-xs">Choisissez votre langue pour commencer</p>
    <div class="flex gap-4">
      <button onclick="startGame('fr')"
        class="px-8 py-4 bg-primary-container text-on-primary-container font-black font-headline rounded-2xl text-xl hover:opacity-90 active:scale-95 transition-all">
        🇫🇷 FR
      </button>
      <button onclick="startGame('en')"
        class="px-8 py-4 bg-surface-container-high text-on-surface font-black font-headline rounded-2xl text-xl hover:bg-surface-bright active:scale-95 transition-all">
        🇬🇧 EN
      </button>
    </div>
  </div>

  <!-- Error toast -->
  <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-on-surface text-surface px-4 py-2 rounded-xl text-sm font-bold font-headline shadow-xl"></div>
  </div>

  <!-- Game board -->
  <main class="flex-1 w-full max-w-lg mx-auto flex flex-col items-center justify-center p-4 gap-6">
    <div id="board" class="grid grid-rows-6 gap-1.5 w-full max-w-[320px]"></div>

    <!-- Keyboard -->
    <section class="w-full bg-surface-container-low p-3 rounded-3xl flex flex-col gap-1.5">
      <div id="kb-row-1" class="flex justify-center gap-1 w-full"></div>
      <div id="kb-row-2" class="flex justify-center gap-1 w-full"></div>
      <div id="kb-row-3" class="flex justify-center gap-1 w-full"></div>
    </section>
  </main>

  <!-- Win modal -->
  <div id="modal-win" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-surface/80 backdrop-blur-sm">
    <div class="w-full max-w-sm bg-surface-container-lowest rounded-2xl shadow-2xl border border-outline-variant overflow-hidden">
      <div class="h-28 bg-gradient-to-br from-primary to-primary-container flex flex-col items-center justify-center text-on-primary p-4">
        <span class="material-symbols-outlined text-4xl mb-1" style="font-variation-settings:'FILL' 1">emoji_events</span>
        <h2 class="text-2xl font-black font-headline tracking-tight" id="win-title">Bravo !</h2>
      </div>
      <div class="p-6 flex flex-col items-center gap-4">
        <p class="text-on-surface-variant text-sm">Le mot était</p>
        <div id="win-word" class="flex gap-1.5"></div>
        <div class="flex gap-2 w-full">
          <button onclick="startGame('fr')"
            class="flex-1 py-3 bg-primary-container text-on-primary-container font-black font-headline rounded-xl hover:opacity-90 active:scale-95 transition-all">
            🇫🇷 FR
          </button>
          <button onclick="startGame('en')"
            class="flex-1 py-3 bg-surface-container-high text-on-surface font-black font-headline rounded-xl hover:bg-surface-bright active:scale-95 transition-all">
            🇬🇧 EN
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Lose modal -->
  <div id="modal-lose" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-surface/80 backdrop-blur-sm">
    <div class="w-full max-w-sm bg-surface-container-lowest rounded-2xl shadow-2xl border border-outline-variant overflow-hidden">
      <div class="p-6 flex flex-col items-center gap-4">
        <span class="material-symbols-outlined text-error text-5xl">sentiment_dissatisfied</span>
        <h2 class="text-2xl font-black font-headline" id="lose-title">Dommage...</h2>
        <p class="text-on-surface-variant text-sm">Le mot était</p>
        <div id="lose-word" class="flex gap-1.5"></div>
        <div class="flex gap-2 w-full">
          <button onclick="startGame('fr')"
            class="flex-1 py-3 bg-primary-container text-on-primary-container font-black font-headline rounded-xl hover:opacity-90 active:scale-95 transition-all">
            🇫🇷 FR
          </button>
          <button onclick="startGame('en')"
            class="flex-1 py-3 bg-surface-container-high text-on-surface font-black font-headline rounded-xl hover:bg-surface-bright active:scale-95 transition-all">
            🇬🇧 EN
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
  // ─── Config ──────────────────────────────────────────────────────────────────
  const API = "http://localhost:8000"
  const WORD_LENGTH = 5
  const MAX_ATTEMPTS = 6

  const KEYBOARDS = {
    en: [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L"],
      ["ENTER","Z","X","C","V","B","N","M","⌫"],
    ],
    fr: [
      ["A","Z","E","R","T","Y","U","I","O","P"],
      ["Q","S","D","F","G","H","J","K","L","M"],
      ["ENTER","W","X","C","V","B","N","⌫"],
    ],
  }

  const LABELS = {
    fr: { win: "Bravo !", lose: "Dommage..." },
    en: { win: "You won!", lose: "Better luck next time!" },
  }

  // ─── State ───────────────────────────────────────────────────────────────────
  let gameId      = null
  let language    = "fr"
  let board       = []   // board[row][col] = { letter, status }
  let currentRow  = 0
  let currentInput = ""
  let keyStates   = {}   // letter → "CORRECT"|"MISPLACED"|"ABSENT"
  let isOver      = false
  let isSubmitting = false

  // ─── Init ────────────────────────────────────────────────────────────────────
  function initBoard() {
    board = Array.from({ length: MAX_ATTEMPTS }, () =>
      Array.from({ length: WORD_LENGTH }, () => ({ letter: "", status: "empty" }))
    )
    currentRow   = 0
    currentInput = ""
    keyStates    = {}
    isOver       = false
  }

  async function newGame() {
    hideModals()
    initBoard()
    renderBoard()
    renderKeyboard()
    updateLangButtons()

    try {
      const res = await fetch(`${API}/game`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ language }),
      })
      const data = await res.json()
      gameId = data.game_id
      localStorage.setItem("wordle_game_id", gameId)
      localStorage.setItem("wordle_language", language)
    } catch (e) {
      showToast("Impossible de joindre l'API. Lance uvicorn !")
    }
  }

  function switchLanguage(lang) {
    document.activeElement.blur()
    language = lang
    newGame()
  }

  function startGame(lang) {
    document.activeElement.blur()
    language = lang
    hideLangOverlay()
    newGame()
  }

  function giveUp() {
    document.activeElement.blur()
    localStorage.removeItem("wordle_game_id")
    localStorage.removeItem("wordle_language")
    gameId = null
    showLangOverlay()
  }

  function showLangOverlay() {
    document.getElementById("lang-overlay").classList.remove("hidden")
    hideModals()
  }

  function hideLangOverlay() {
    document.getElementById("lang-overlay").classList.add("hidden")
  }

  // ─── Input handling ──────────────────────────────────────────────────────────
  document.addEventListener("keydown", (e) => {
    if (isOver) return
    if (e.key === "Enter")     handleEnter()
    else if (e.key === "Backspace") handleBackspace()
    else if (/^[a-zA-ZÀ-ÿ]$/.test(e.key)) handleLetter(e.key.toUpperCase())
  })

  function handleLetter(letter) {
    if (isSubmitting || currentInput.length >= WORD_LENGTH) return
    currentInput += letter
    updateCurrentRowDisplay()
  }

  function handleBackspace() {
    if (isSubmitting || currentInput.length === 0) return
    currentInput = currentInput.slice(0, -1)
    updateCurrentRowDisplay()
  }

  async function handleEnter() {
    if (isSubmitting || !gameId) return
    if (currentInput.length < WORD_LENGTH) {
      shakeRow(currentRow)
      showToast(language === "fr" ? "Mot trop court" : "Not enough letters")
      return
    }
    await submitGuess()
  }

  // ─── API calls ───────────────────────────────────────────────────────────────
  async function submitGuess() {
    if (isSubmitting) return
    isSubmitting = true
    const guess = currentInput

    try {
      const res = await fetch(`${API}/game/${gameId}/guess`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ word: guess }),
      })

      if (!res.ok) {
        const err = await res.json()
        shakeRow(currentRow)
        showToast(err.detail || "Erreur")
        return
      }

      const data = await res.json()
      applyFeedback(data.feedback, guess)
      isOver = data.is_over

      if (data.is_over) {
        setTimeout(() => {
          if (data.is_won) showWinModal(data.secret_word)
          else             showLoseModal(data.secret_word)
        }, WORD_LENGTH * 200 + 300)
      }

      currentInput = ""
      currentRow++

    } catch (e) {
      showToast("Erreur réseau")
    } finally {
      isSubmitting = false
    }
  }

  function reconstructAttempt(word, feedback, row) {
    const PRIORITY = { CORRECT: 3, MISPLACED: 2, ABSENT: 1 }
    for (let c = 0; c < WORD_LENGTH; c++) {
      const letter = word[c]
      const status = feedback[c]
      const tile = document.getElementById(`tile-${row}-${c}`)
      if (!tile) continue
      tile.className = tileClass(status)
      tile.textContent = letter
      if (!keyStates[letter] || PRIORITY[status] > PRIORITY[keyStates[letter]]) {
        keyStates[letter] = status
      }
    }
  }

  async function restoreGame() {
    const savedId = localStorage.getItem("wordle_game_id")
    const savedLang = localStorage.getItem("wordle_language")
    if (!savedId) {
      showLangOverlay()
      return
    }

    try {
      const res = await fetch(`${API}/game/${savedId}`)
      if (!res.ok) {
        localStorage.removeItem("wordle_game_id")
        localStorage.removeItem("wordle_language")
        showLangOverlay()
        return
      }
      const data = await res.json()

      gameId = savedId
      language = savedLang || "fr"
      hideLangOverlay()
      initBoard()
      renderBoard()

      data.attempts.forEach((attempt, row) => {
        reconstructAttempt(attempt.word, attempt.feedback, row)
      })

      currentRow = data.attempts.length
      isOver = data.is_over
      updateLangButtons()
      renderKeyboard()

      if (data.is_over) {
        if (data.is_won) showWinModal(data.secret_word)
        else showLoseModal(data.secret_word)
      }
    } catch (e) {
      localStorage.removeItem("wordle_game_id")
      localStorage.removeItem("wordle_language")
      showLangOverlay()
    }
  }

  // ─── Board rendering ─────────────────────────────────────────────────────────
  function renderBoard() {
    const el = document.getElementById("board")
    el.innerHTML = ""
    for (let r = 0; r < MAX_ATTEMPTS; r++) {
      const row = document.createElement("div")
      row.id = `row-${r}`
      row.className = "grid grid-cols-5 gap-1.5"
      for (let c = 0; c < WORD_LENGTH; c++) {
        const tile = document.createElement("div")
        tile.id = `tile-${r}-${c}`
        tile.className = tileClass("empty")
        row.appendChild(tile)
      }
      el.appendChild(row)
    }
  }

  function updateCurrentRowDisplay() {
    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = document.getElementById(`tile-${currentRow}-${c}`)
      if (!tile) continue
      const letter = currentInput[c] || ""
      const status = letter ? "pending" : "empty"
      tile.className = tileClass(status)
      tile.textContent = letter

      // petit effet pop sur la dernière lettre tapée
      if (letter && c === currentInput.length - 1) {
        tile.classList.add("animate-pop")
        tile.addEventListener("animationend", () => tile.classList.remove("animate-pop"), { once: true })
      }
    }
  }

  function applyFeedback(feedback, word) {
    // Priorité pour les keyStates : CORRECT > MISPLACED > ABSENT
    const PRIORITY = { CORRECT: 3, MISPLACED: 2, ABSENT: 1 }

    feedback.forEach((status, c) => {
      const letter = word[c]
      const tile = document.getElementById(`tile-${currentRow}-${c}`)
      if (!tile) return

      // flip animé avec délai par colonne
      setTimeout(() => {
        tile.className = tileClass(status)
        tile.textContent = letter
        tile.classList.add("tile-flip")
        tile.addEventListener("animationend", () => tile.classList.remove("tile-flip"), { once: true })
      }, c * 200)

      // mise à jour du clavier (garde le meilleur état)
      if (!keyStates[letter] || PRIORITY[status] > PRIORITY[keyStates[letter]]) {
        keyStates[letter] = status
        setTimeout(() => updateKeyColor(letter, status), c * 200 + 300)
      }
    })
  }

  function tileClass(status) {
    const base = "aspect-square flex items-center justify-center text-2xl font-black font-headline rounded-xl transition-all duration-150"
    const styles = {
      empty:    "bg-surface-container-low border border-outline-variant/20",
      pending:  "bg-surface-container-low border-2 border-outline-variant text-on-surface",
      CORRECT:  "bg-primary-container text-on-primary-container",
      MISPLACED:"bg-secondary-container text-on-secondary-container",
      ABSENT:   "bg-surface-container-highest text-on-surface",
    }
    return `${base} ${styles[status] || styles.empty}`
  }

  function shakeRow(row) {
    const el = document.getElementById(`row-${row}`)
    el.classList.add("animate-shake")
    el.addEventListener("animationend", () => el.classList.remove("animate-shake"), { once: true })
  }

  // ─── Keyboard rendering ──────────────────────────────────────────────────────
  function renderKeyboard() {
    const rows = KEYBOARDS[language]
    rows.forEach((letters, i) => {
      const rowEl = document.getElementById(`kb-row-${i + 1}`)
      rowEl.innerHTML = ""
      letters.forEach(letter => {
        const btn = document.createElement("button")
        btn.id = `key-${letter}`
        btn.textContent = letter === "⌫" ? "" : letter
        if (letter === "⌫") {
          const icon = document.createElement("span")
          icon.className = "material-symbols-outlined text-base"
          icon.textContent = "backspace"
          btn.appendChild(icon)
        }
        btn.className = keyClass(letter, null)
        btn.onclick = () => {
          if (letter === "ENTER")    handleEnter()
          else if (letter === "⌫")  handleBackspace()
          else                       handleLetter(letter)
        }
        rowEl.appendChild(btn)
      })
    })
  }

  function updateKeyColor(letter, status) {
    const btn = document.getElementById(`key-${letter}`)
    if (btn) btn.className = keyClass(letter, status)
  }

  function keyClass(letter, status) {
    const isWide = letter === "ENTER" || letter === "⌫"
    const base = `key-press h-14 flex items-center justify-center rounded-xl text-sm font-bold font-headline transition-all duration-200 cursor-pointer ${isWide ? "px-3 flex-[1.5]" : "flex-1 max-w-[42px]"}`
    const styles = {
      CORRECT:  "bg-primary-container text-on-primary-container",
      MISPLACED:"bg-secondary-container text-on-secondary-container",
      ABSENT:   "bg-surface-variant text-on-surface opacity-60",
      default:  "bg-surface-container-high text-on-surface hover:bg-surface-bright",
    }
    const s = status || keyStates[letter]
    return `${base} ${styles[s] || styles.default}`
  }

  // ─── Modals ──────────────────────────────────────────────────────────────────
  function showWinModal(word) {
    document.getElementById("win-title").textContent = LABELS[language].win
    document.getElementById("win-word").innerHTML = revealedWordHTML(word, "primary")
    document.getElementById("modal-win").classList.remove("hidden")
  }

  function showLoseModal(word) {
    document.getElementById("lose-title").textContent = LABELS[language].lose
    document.getElementById("lose-word").innerHTML = revealedWordHTML(word, "error")
    document.getElementById("modal-lose").classList.remove("hidden")
  }

  function hideModals() {
    document.getElementById("modal-win").classList.add("hidden")
    document.getElementById("modal-lose").classList.add("hidden")
  }

  function revealedWordHTML(word, color) {
    if (!word) return ""
    const colors = {
      primary: "bg-primary-container text-on-primary-container",
      error:   "bg-error-container text-on-error-container",
    }
    return word.split("").map(l =>
      `<div class="w-12 h-14 ${colors[color]} flex items-center justify-center text-2xl font-black font-headline rounded-xl">${l}</div>`
    ).join("")
  }

  // ─── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer = null
  function showToast(msg) {
    const toast = document.getElementById("toast")
    toast.querySelector("div").textContent = msg
    toast.classList.remove("hidden")
    if (toastTimer) clearTimeout(toastTimer)
    toastTimer = setTimeout(() => toast.classList.add("hidden"), 2000)
  }

  // ─── Language buttons ────────────────────────────────────────────────────────
  function updateLangButtons() {
    const active   = "px-3 py-1 rounded-xl text-sm font-bold font-headline bg-primary-container text-on-primary-container"
    const inactive = "px-3 py-1 rounded-xl text-sm font-bold font-headline text-on-surface-variant hover:text-on-surface transition-colors"
    document.getElementById("btn-fr").className = language === "fr" ? active : inactive
    document.getElementById("btn-en").className = language === "en" ? active : inactive
  }

  // ─── Start ───────────────────────────────────────────────────────────────────
  restoreGame()
</script>
</body>
</html>
